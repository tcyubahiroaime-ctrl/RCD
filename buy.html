<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Payment | RWANDA CAR DEALER</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
    --primary:#d4af37;
    --dark:#0f0f0f;
    --dark-light:#1a1a1a;
    --white:#fff;
    --gray:#aaa;
    --shadow:0 10px 30px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--dark);color:var(--white);line-height:1.6;}
.container{max-width:700px;margin:50px auto;background:var(--dark-light);padding:40px;border-radius:15px;box-shadow:var(--shadow);}
h1{text-align:center;color:var(--primary);margin-bottom:30px;}
.payment-methods{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-bottom:30px;
}
.method{
    background:#111;
    padding:20px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    flex:1;
    transition:0.3s;
    border:2px solid transparent;
}
.method:hover{border:2px solid var(--primary);transform:translateY(-5px);}
.method i{font-size:35px;color:var(--primary);margin-bottom:10px;}
.selected{border:2px solid var(--primary);}
form .form-group{margin-bottom:15px;}
form label{display:block;margin-bottom:5px;font-weight:600;}
form input, form select{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#111;color:#fff;}
form input:focus, form select:focus{border:1px solid var(--primary);outline:none;}
button{width:100%;padding:15px;background:var(--primary);border:none;color:#000;font-size:18px;border-radius:10px;cursor:pointer;transition:0.3s;}
button:hover{background:#fff;}
.payment-form{display:none;margin-top:20px;}
</style>
</head>
<body>

<div class="container">
    <h1>Car Payment</h1>
    <p style="text-align:center;margin-bottom:20px;">Select your preferred payment method</p>

    <!-- Payment Methods -->
    <div class="payment-methods">
        <div class="method" data-method="bank"><i class="fas fa-university"></i><h3>Bank Transfer</h3></div>
        <div class="method" data-method="mtn"><i class="fas fa-mobile-alt"></i><h3>MTN Mobile Money</h3></div>
        <div class="method" data-method="airtel"><i class="fas fa-mobile-alt"></i><h3>Airtel Money</h3></div>
    </div>

    <!-- Bank Form -->
    <form id="bank-form" class="payment-form" action="submit_payment.php" method="POST">
        <h2 style="color:var(--primary);margin-bottom:15px;">Bank Transfer</h2>
        <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="Your full name" required></div>
        <div class="form-group"><label>Car Model</label><input type="text" name="car_model" placeholder="" required></div>
        <div class="form-group"><label>Amount</label><input type="text" name="amount" placeholder="60,000,000 RWF" required></div>
        <div class="form-group"><label>Bank Name</label>
            <select name="bank_name" required>
                <option value="">Select Bank</option>
                <option>Bank of Kigali</option>
                <option>Equity Bank</option>
                <option>Cogebanque</option>
                <option>Access Bank</option>
            </select>
        </div>
        <div class="form-group"><label>Transaction Reference Number</label><input type="text" name="reference" placeholder="Bank transaction ref" required></div>
        <button type="submit">Submit Payment</button>
    </form>

    <!-- MTN Form -->
    <form id="mtn-form" class="payment-form" action="submit_payment.php" method="POST">
        <h2 style="color:var(--primary);margin-bottom:15px;">MTN Mobile Money</h2>
        <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="Your full name" required></div>
        <div class="form-group"><label>Car Model</label><input type="text" name="car_model" placeholder="" required></div>
        <div class="form-group"><label>Amount</label><input type="text" name="amount" placeholder="60,000,000 RWF" required></div>
        <div class="form-group"><label>MTN Mobile Number</label><input type="text" name="mtn_number" placeholder="0788xxxxxx" required></div>
        <div class="form-group"><label>Transaction Reference</label><input type="text" name="reference" placeholder="MM transaction ref" required></div>
        <button type="submit">Submit Payment</button>
    </form>

    <!-- Airtel Form -->
    <form id="airtel-form" class="payment-form" action="submit_payment.php" method="POST">
        <h2 style="color:var(--primary);margin-bottom:15px;">Airtel Money</h2>
        <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="Your full name" required></div>
        <div class="form-group"><label>Car Model</label><input type="text" name="car_model" placeholder="" required></div>
        <div class="form-group"><label>Amount</label><input type="text" name="amount" placeholder="60,000,000 RWF" required></div>
        <div class="form-group"><label>Airtel Number</label><input type="text" name="airtel_number" placeholder="0788xxxxxx" required></div>
        <div class="form-group"><label>Transaction Reference</label><input type="text" name="reference" placeholder="AM transaction ref" required></div>
        <button type="submit">Submit Payment</button>
    </form>

</div>

<script>
// Payment method selection
const methods = document.querySelectorAll('.method');
const forms = {
    bank: document.getElementById('bank-form'),
    mtn: document.getElementById('mtn-form'),
    airtel: document.getElementById('airtel-form')
};

methods.forEach(method=>{
    method.addEventListener('click',()=>{
        // Highlight selected
        methods.forEach(m=>m.classList.remove('selected'));
        method.classList.add('selected');

        // Show correct form
        const selected = method.dataset.method;
        Object.keys(forms).forEach(f=>forms[f].style.display='none');
        forms[selected].style.display='block';
    });
});
</script>

</body>
</html>
